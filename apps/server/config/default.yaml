server:
  port: 9527

plugins: [ ]


# ---------------------------------------------------------------------------
# 微信模块配置（全局单例）
# 控制 HTTP 路由注册（/wechat/qr/*）和账号凭证存储目录
# ---------------------------------------------------------------------------
wechat:
  enabled: true
  # dataDir: ~/.iris/wechat/accounts   # 凭证持久化目录，默认 ~/.iris



# channels 数组形式，每个 channel 有 type（适配器类型）和 name（唯一实例名）
channels:
  - type: feishu
    name: feishu-openclaw
    enabled: false
    apps:
      - appId: cli_xxx
        appSecret: xxx
        domain: feishu   # feishu (domestic) or lark (international)
        groupPolicy: "open"
        streaming: true
        requireMention: true
  - type: feishu
    name: feishu-iris
    enabled: false
    apps:
      - appId: cli_xxx
        appSecret: xxx
        domain: feishu   # feishu (domestic) or lark (international)
        groupPolicy: "open"
        streaming: true
        requireMention: true
  # 微信分组：仅做路由分发分组，accountIds 指定该分组关联的账号
  # backends.routes 中用 name 做路由 key
  - type: wechat
    name: wechat-main
    enabled: true
    accountIds:
    # - "xxxx@im.bot"   # 扫码登录后获得的 accountId


backends:
  # Backend options:
  #   hermes:       HTTP REST → hermes-agent's OpenAI-compatible api_server
  #   openclaw-channel: WS-based flow via the iris channel plugin installed in openclaw
  #   claude-code:  WS-based flow via claude-code-channel CLI
  default: claude-code

  # routes: 按 channel name（实例名）分发到对应 backend
  routes:
    feishu-openclaw: openclaw
    feishu-iris: claude-code
    # 微信用户走 hermes-agent（HTTP REST 模式）
    wechat-main: hermes
    # 不在channel中定义的微信用户，默认转发渠道
    wechat-default: openclaw
    # feishu-support: openclaw
    # telegram-main: hermes

  # ---------------------------------------------------------------------------
  # hermes-agent backend (WS plugin mode)
  # plugin-hermes CLI connects HERE as WS client; iris is the WS server.
  # Run: hermes-plugin --iris-ws ws://localhost:9527/ws/hermes \
  #                    --hermes-url http://localhost:8642 \
  #                    --hermes-key <API_SERVER_KEY>
  #
  # In hermes-agent config.yaml, enable api_server:
  #   platforms:
  #     api_server:
  #       enabled: true
  #       host: 127.0.0.1
  #       port: 8642
  # ---------------------------------------------------------------------------
  hermes:
    enabled: true
    # path: /ws/hermes       # WS endpoint plugin-hermes connects to
    # timeoutMs: 300000      # 5 min reply timeout

  openclaw:
    enabled: false
    # WS path: /ws/openclaw (default). Configure irisWsUrl in openclaw as:
    #   ws://<iris-host>:9527/ws/openclaw
    # path: /ws/openclaw           # override if needed

  claude-code:
    enabled: false
    # WS path: /ws/claude-code (default), timeout: 900000ms (15 min)
    # Run the CLI: claude-code-channel --iris-ws ws://<iris-host>:9527/ws/claude-code

